<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" role="img" aria-label="Gosvor Robot Limpiafondos Inalámbrico básico para piscinas hasta 80 m²">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0fafe"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="robotBodyBasic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="trackGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="floorReflect" cx="50%" cy="100%" r="60%">
      <stop offset="0" stop-color="#bae6fd" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#bae6fd" stop-opacity="0"/>
    </radialGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0284c7" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="420" fill="url(#cardBg)"/>

  <!-- Pool tile floor subtle texture -->
  <g stroke="#bfdbfe" stroke-width="0.8" opacity="0.4">
    <line x1="0" y1="340" x2="500" y2="340"/>
    <line x1="0" y1="360" x2="500" y2="360"/>
    <line x1="0" y1="380" x2="500" y2="380"/>
    <line x1="0" y1="400" x2="500" y2="400"/>
    <line x1="50"  y1="330" x2="50"  y2="420"/>
    <line x1="100" y1="330" x2="100" y2="420"/>
    <line x1="150" y1="330" x2="150" y2="420"/>
    <line x1="200" y1="330" x2="200" y2="420"/>
    <line x1="250" y1="330" x2="250" y2="420"/>
    <line x1="300" y1="330" x2="300" y2="420"/>
    <line x1="350" y1="330" x2="350" y2="420"/>
    <line x1="400" y1="330" x2="400" y2="420"/>
    <line x1="450" y1="330" x2="450" y2="420"/>
  </g>

  <!-- Robot shadow -->
  <ellipse cx="250" cy="340" rx="140" ry="22" fill="#0284c7" opacity="0.12"/>
  <rect x="110" y="332" width="280" height="8" rx="4" fill="url(#floorReflect)"/>

  <!-- === ROBOT BODY === -->
  <g filter="url(#dropShadow)" transform="translate(90, 130)">
    <!-- Main body (wide compact dome) -->
    <ellipse cx="160" cy="140" rx="140" ry="90" fill="url(#robotBodyBasic)" stroke="#cbd5e1" stroke-width="2.5"/>
    <!-- Top dome detail -->
    <ellipse cx="160" cy="115" rx="110" ry="50" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
    <ellipse cx="160" cy="105" rx="85" ry="36" fill="#f8fafc"/>

    <!-- Brand name -->
    <text x="160" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#1e3a5f" text-anchor="middle" letter-spacing="1">GOSVOR</text>

    <!-- LED indicator row -->
    <circle cx="128" cy="124" r="6" fill="#22c55e"/>
    <circle cx="160" cy="124" r="6" fill="#22c55e" opacity="0.5"/>
    <circle cx="192" cy="124" r="6" fill="#d1d5db"/>

    <!-- Battery indicator label -->
    <text x="160" y="143" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">90 min batería</text>

    <!-- Front sensors (2 eyes) -->
    <circle cx="120" cy="160" r="14" fill="#1e3a5f" stroke="#475569" stroke-width="2"/>
    <circle cx="120" cy="160" r="7" fill="#3b82f6"/>
    <circle cx="116" cy="156" r="3" fill="#bae6fd" opacity="0.8"/>
    <circle cx="200" cy="160" r="14" fill="#1e3a5f" stroke="#475569" stroke-width="2"/>
    <circle cx="200" cy="160" r="7" fill="#3b82f6"/>
    <circle cx="196" cy="156" r="3" fill="#bae6fd" opacity="0.8"/>

    <!-- Track wheels (left) -->
    <rect x="0" y="155" width="28" height="60" rx="8" fill="url(#trackGrad)"/>
    <g fill="#334155">
      <rect x="2"  y="162" width="24" height="8" rx="2"/>
      <rect x="2"  y="173" width="24" height="8" rx="2"/>
      <rect x="2"  y="184" width="24" height="8" rx="2"/>
      <rect x="2"  y="195" width="24" height="8" rx="2"/>
    </g>

    <!-- Track wheels (right) -->
    <rect x="292" y="155" width="28" height="60" rx="8" fill="url(#trackGrad)"/>
    <g fill="#334155">
      <rect x="294" y="162" width="24" height="8" rx="2"/>
      <rect x="294" y="173" width="24" height="8" rx="2"/>
      <rect x="294" y="184" width="24" height="8" rx="2"/>
      <rect x="294" y="195" width="24" height="8" rx="2"/>
    </g>

    <!-- Bottom suction area -->
    <ellipse cx="160" cy="215" rx="100" ry="18" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.5"/>
    <ellipse cx="160" cy="215" rx="70" ry="12" fill="#e2e8f0"/>
    <!-- Suction grid -->
    <g stroke="#94a3b8" stroke-width="0.8" opacity="0.6">
      <line x1="100" y1="215" x2="220" y2="215"/>
      <line x1="115" y1="208" x2="115" y2="222"/>
      <line x1="140" y1="205" x2="140" y2="225"/>
      <line x1="160" y1="204" x2="160" y2="226"/>
      <line x1="180" y1="205" x2="180" y2="225"/>
      <line x1="205" y1="208" x2="205" y2="222"/>
    </g>
  </g>

  <!-- Spec badges -->
  <g transform="translate(30, 50)">
    <rect x="0" y="0" width="110" height="30" rx="15" fill="#1e40af" opacity="0.9"/>
    <text x="55" y="20" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Hasta 80 m²</text>
  </g>
  <g transform="translate(30, 90)">
    <rect x="0" y="0" width="110" height="30" rx="15" fill="#0284c7" opacity="0.85"/>
    <text x="55" y="20" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Sin cables</text>
  </g>
  <g transform="translate(360, 50)">
    <rect x="0" y="0" width="110" height="30" rx="15" fill="#0f766e" opacity="0.9"/>
    <text x="55" y="20" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">90 min bat.</text>
  </g>
  <g transform="translate(360, 90)">
    <rect x="0" y="0" width="110" height="30" rx="15" fill="#7c3aed" opacity="0.85"/>
    <text x="55" y="20" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Fondo</text>
  </g>
</svg>
