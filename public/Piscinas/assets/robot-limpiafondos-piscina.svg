<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Robot limpiafondos automático trabajando en el fondo de una piscina">
  <defs>
    <linearGradient id="deepWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#0c4a6e" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="poolFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bae6fd"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="robotBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1f5f9"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <radialGradient id="lightRay" cx="50%" cy="0%" r="80%">
      <stop offset="0" stop-color="#bae6fd" stop-opacity="0.6"/>
      <stop offset="100" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="waterBlur"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="robotGlow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Water background (deep underwater) -->
  <rect width="800" height="400" fill="#0c4a6e"/>
  <rect width="800" height="400" fill="url(#deepWater)"/>

  <!-- Light rays from surface -->
  <polygon points="300,0 340,0 420,400 260,400" fill="#bae6fd" opacity="0.07"/>
  <polygon points="420,0 450,0 500,400 370,400" fill="#7dd3fc" opacity="0.06"/>
  <polygon points="540,0 570,0 610,400 480,400" fill="#bae6fd" opacity="0.07"/>
  <polygon points="650,0 670,0 700,400 620,400" fill="#7dd3fc" opacity="0.05"/>

  <!-- Water surface (top) -->
  <rect x="0" y="0" width="800" height="40" fill="#38bdf8" opacity="0.3"/>
  <path d="M0 25 Q 100 10, 200 25 Q 300 40, 400 25 Q 500 10, 600 25 Q 700 40, 800 25 L800 0 L0 0Z" fill="#7dd3fc" opacity="0.35"/>
  <path d="M0 35 Q 150 20, 300 35 Q 450 50, 600 35 Q 700 25, 800 35" fill="none" stroke="#bae6fd" stroke-width="2" opacity="0.5"/>

  <!-- Caustic light on floor (underwater light patterns) -->
  <ellipse cx="200" cy="370" rx="80" ry="15" fill="#7dd3fc" opacity="0.18" filter="url(#waterBlur)"/>
  <ellipse cx="400" cy="380" rx="100" ry="12" fill="#bae6fd" opacity="0.15" filter="url(#waterBlur)"/>
  <ellipse cx="600" cy="375" rx="70" ry="12" fill="#7dd3fc" opacity="0.18" filter="url(#waterBlur)"/>

  <!-- Pool floor tiles -->
  <rect x="0" y="355" width="800" height="45" fill="url(#poolFloor)" opacity="0.6"/>
  <!-- Floor tile grid -->
  <g stroke="#93c5fd" stroke-width="0.8" opacity="0.4">
    <line x1="0" y1="355" x2="800" y2="355"/>
    <line x1="0" y1="370" x2="800" y2="370"/>
    <line x1="0" y1="385" x2="800" y2="385"/>
    <line x1="50" y1="355" x2="50" y2="400"/>
    <line x1="100" y1="355" x2="100" y2="400"/>
    <line x1="150" y1="355" x2="150" y2="400"/>
    <line x1="200" y1="355" x2="200" y2="400"/>
    <line x1="250" y1="355" x2="250" y2="400"/>
    <line x1="300" y1="355" x2="300" y2="400"/>
    <line x1="350" y1="355" x2="350" y2="400"/>
    <line x1="400" y1="355" x2="400" y2="400"/>
    <line x1="450" y1="355" x2="450" y2="400"/>
    <line x1="500" y1="355" x2="500" y2="400"/>
    <line x1="550" y1="355" x2="550" y2="400"/>
    <line x1="600" y1="355" x2="600" y2="400"/>
    <line x1="650" y1="355" x2="650" y2="400"/>
    <line x1="700" y1="355" x2="700" y2="400"/>
    <line x1="750" y1="355" x2="750" y2="400"/>
  </g>

  <!-- Robot tracks / path already cleaned -->
  <path d="M100 355 L 100 340 L 650 340 L 650 355" fill="none" stroke="#e0f2fe" stroke-width="4" stroke-opacity="0.3" stroke-dasharray="10,6"/>

  <!-- Robot body -->
  <g transform="translate(300, 270)">
    <!-- Main body -->
    <rect x="0" y="30" width="200" height="80" rx="16" fill="url(#robotBody)" stroke="#94a3b8" stroke-width="2"/>
    <!-- Top dome / sensor housing -->
    <ellipse cx="100" cy="42" rx="65" ry="22" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <ellipse cx="100" cy="40" rx="55" ry="16" fill="#cbd5e1"/>
    <!-- Status LED -->
    <circle cx="100" cy="38" r="8" fill="#22d3ee" filter="url(#robotGlow)" opacity="0.9"/>
    <circle cx="100" cy="38" r="4" fill="#ffffff" opacity="0.8"/>

    <!-- Side bumpers -->
    <rect x="-10" y="45" width="18" height="55" rx="6" fill="#94a3b8"/>
    <rect x="192" y="45" width="18" height="55" rx="6" fill="#94a3b8"/>

    <!-- Front sensor eyes -->
    <circle cx="60" cy="65" r="10" fill="#1e3a5f" stroke="#475569" stroke-width="1.5"/>
    <circle cx="60" cy="65" r="5" fill="#3b82f6"/>
    <circle cx="58" cy="63" r="2" fill="#bae6fd" opacity="0.8"/>
    <circle cx="140" cy="65" r="10" fill="#1e3a5f" stroke="#475569" stroke-width="1.5"/>
    <circle cx="140" cy="65" r="5" fill="#3b82f6"/>
    <circle cx="138" cy="63" r="2" fill="#bae6fd" opacity="0.8"/>

    <!-- Wheels/tracks -->
    <rect x="15" y="100" width="170" height="20" rx="6" fill="#374151"/>
    <!-- Track tread pattern -->
    <g fill="#1e293b">
      <rect x="20"  y="102" width="12" height="16" rx="2"/>
      <rect x="36"  y="102" width="12" height="16" rx="2"/>
      <rect x="52"  y="102" width="12" height="16" rx="2"/>
      <rect x="68"  y="102" width="12" height="16" rx="2"/>
      <rect x="84"  y="102" width="12" height="16" rx="2"/>
      <rect x="100" y="102" width="12" height="16" rx="2"/>
      <rect x="116" y="102" width="12" height="16" rx="2"/>
      <rect x="132" y="102" width="12" height="16" rx="2"/>
      <rect x="148" y="102" width="12" height="16" rx="2"/>
      <rect x="164" y="102" width="12" height="16" rx="2"/>
    </g>
    <!-- Filter housing -->
    <rect x="70" y="78" width="60" height="22" rx="5" fill="#64748b"/>
    <text x="100" y="93" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle" font-weight="600">FILTER</text>

    <!-- Power cable -->
    <path d="M 100 30 Q 100 0, 120 -40 Q 140 -80, 160 -120" fill="none" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <circle cx="163" cy="-124" r="6" fill="#94a3b8"/>
  </g>

  <!-- Bubbles around robot -->
  <g fill="#bae6fd" opacity="0.5">
    <circle cx="295" cy="310" r="5"/>
    <circle cx="510" cy="295" r="4"/>
    <circle cx="285" cy="270" r="3"/>
    <circle cx="520" cy="330" r="6"/>
    <circle cx="540" cy="260" r="3"/>
    <circle cx="280" cy="240" r="5"/>
  </g>

  <!-- Floating debris being sucked in (dots) -->
  <g fill="#94a3b8" opacity="0.5">
    <circle cx="340" cy="350" r="3"/>
    <circle cx="370" cy="355" r="2"/>
    <circle cx="420" cy="352" r="3"/>
    <circle cx="460" cy="356" r="2"/>
  </g>

  <!-- Label badge -->
  <rect x="30" y="345" width="230" height="34" rx="17" fill="#0c4a6e" opacity="0.88"/>
  <text x="145" y="367" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#bae6fd" text-anchor="middle">Robot limpiafondos · Automático</text>
</svg>
