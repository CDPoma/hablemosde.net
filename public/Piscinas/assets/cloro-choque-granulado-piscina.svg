<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" role="img" aria-label="Cloro choque granulado para piscina">
  <defs>
    <linearGradient id="prodBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0f9ff"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="granules" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <radialGradient id="splash" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="420" fill="url(#prodBg)"/>

  <!-- Water splash background -->
  <ellipse cx="250" cy="380" rx="220" ry="60" fill="url(#splash)"/>
  <path d="M60 350 Q 150 320, 250 340 Q 350 360, 440 340 Q 460 338, 470 345 Q 440 370, 250 380 Q 60 390, 30 360Z" fill="#bfdbfe" opacity="0.35"/>

  <!-- Water droplets -->
  <ellipse cx="80"  cy="340" rx="8" ry="14" fill="#3b82f6" opacity="0.3" transform="rotate(-20, 80, 340)"/>
  <ellipse cx="420" cy="345" rx="7" ry="12" fill="#3b82f6" opacity="0.3" transform="rotate(15, 420, 345)"/>
  <ellipse cx="150" cy="330" rx="5" ry="9"  fill="#60a5fa" opacity="0.35" transform="rotate(-10, 150, 330)"/>
  <ellipse cx="370" cy="325" rx="6" ry="10" fill="#60a5fa" opacity="0.35" transform="rotate(10, 370, 325)"/>

  <!-- Product bag / container -->
  <rect x="130" y="80" width="240" height="290" rx="18" fill="url(#bagGrad)" stroke="#93c5fd" stroke-width="2"/>
  <!-- Bag seal top -->
  <rect x="130" y="80" width="240" height="28" rx="10" fill="#dbeafe"/>
  <rect x="145" y="90" width="210" height="8" rx="4" fill="#93c5fd" opacity="0.7"/>

  <!-- Granule texture (top of bag open) -->
  <ellipse cx="250" cy="130" rx="90" ry="20" fill="url(#granules)"/>
  <g fill="#d1d5db" opacity="0.8">
    <circle cx="195" cy="128" r="5"/>
    <circle cx="215" cy="132" r="4"/>
    <circle cx="235" cy="126" r="6"/>
    <circle cx="255" cy="130" r="4"/>
    <circle cx="275" cy="126" r="5"/>
    <circle cx="292" cy="131" r="4"/>
    <circle cx="310" cy="127" r="3"/>
  </g>

  <!-- Blue label area -->
  <rect x="140" y="140" width="220" height="160" rx="10" fill="url(#labelGrad)"/>

  <!-- "CHOQUE" big text on label -->
  <text x="250" y="185" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-1">CHOQUE</text>
  <!-- Subtitle -->
  <text x="250" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#bfdbfe" text-anchor="middle">Cloro Granulado</text>

  <!-- Divider line -->
  <line x1="155" y1="218" x2="345" y2="218" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>

  <!-- "2 kg" -->
  <text x="210" y="255" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="800" fill="#fbbf24" text-anchor="middle">2</text>
  <text x="258" y="255" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#fef3c7" text-anchor="start">kg</text>

  <!-- Brand area at bottom of label -->
  <rect x="140" y="280" width="220" height="20" rx="5" fill="#1e3a8a"/>
  <text x="250" y="294" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#bfdbfe" text-anchor="middle" letter-spacing="2">TECHZOCO · FABRICADO EN ESPAÑA</text>

  <!-- Granules spilling out at bottom of bag -->
  <g fill="#f1f5f9" opacity="0.85">
    <circle cx="185" cy="368" r="5"/>
    <circle cx="200" cy="378" r="4"/>
    <circle cx="218" cy="365" r="6"/>
    <circle cx="238" cy="374" r="5"/>
    <circle cx="255" cy="360" r="4"/>
    <circle cx="272" cy="370" r="6"/>
    <circle cx="292" cy="362" r="4"/>
    <circle cx="312" cy="373" r="5"/>
    <circle cx="330" cy="366" r="3"/>
    <circle cx="175" cy="380" r="3"/>
    <circle cx="345" cy="375" r="4"/>
  </g>

  <!-- Cl chemical symbol badge -->
  <circle cx="390" cy="110" r="38" fill="#1e40af" stroke="#3b82f6" stroke-width="2"/>
  <text x="390" y="103" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="900" fill="#ffffff" text-anchor="middle">Cl</text>
  <text x="390" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#bfdbfe" text-anchor="middle">70%</text>
  <text x="390" y="133" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle">CLORO ACT.</text>

  <!-- Warning pictogram -->
  <g transform="translate(100, 95)">
    <polygon points="22,0 44,38 0,38" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
    <text x="22" y="30" font-family="Arial" font-size="22" font-weight="900" fill="#78350f" text-anchor="middle">!</text>
  </g>
</svg>
