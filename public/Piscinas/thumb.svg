<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="agua" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="suelo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8dcc8"/>
    </linearGradient>
  </defs>

  <!-- Cielo -->
  <rect width="800" height="450" fill="url(#sky)"/>
  <!-- Suelo / baldosas -->
  <rect x="0" y="290" width="800" height="160" fill="url(#suelo)"/>

  <!-- Sol -->
  <circle cx="700" cy="75" r="52" fill="#fde047" opacity="0.9"/>
  <g stroke="#fde047" stroke-width="3" opacity="0.5">
    <line x1="700" y1="8" x2="700" y2="-5"/>
    <line x1="700" y1="142" x2="700" y2="155"/>
    <line x1="633" y1="75" x2="620" y2="75"/>
    <line x1="765" y1="75" x2="778" y2="75"/>
    <line x1="652" y1="27" x2="643" y2="18"/>
    <line x1="748" y1="123" x2="757" y2="132"/>
    <line x1="748" y1="27" x2="757" y2="18"/>
    <line x1="652" y1="123" x2="643" y2="132"/>
  </g>

  <!-- Nubes -->
  <g fill="white" opacity="0.85">
    <ellipse cx="120" cy="55" rx="48" ry="22"/>
    <ellipse cx="155" cy="50" rx="38" ry="20"/>
    <ellipse cx="90" cy="60" rx="32" ry="18"/>
    <ellipse cx="420" cy="40" rx="42" ry="19"/>
    <ellipse cx="452" cy="37" rx="32" ry="17"/>
  </g>

  <!-- Piscina (forma rectangular con bordes redondeados) -->
  <rect x="100" y="210" width="600" height="200" rx="20" fill="#0369a1" opacity="0.3"/>
  <rect x="108" y="218" width="584" height="184" rx="16" fill="url(#agua)"/>

  <!-- Efecto ondas del agua -->
  <g fill="none" stroke="white" stroke-width="2.5" opacity="0.35">
    <path d="M140,255 Q200,242 260,255 Q320,268 380,255 Q440,242 500,255 Q560,268 620,255 Q660,248 680,255"/>
    <path d="M130,280 Q195,267 260,280 Q325,293 390,280 Q455,267 520,280 Q580,293 640,280 Q665,274 685,280"/>
    <path d="M140,305 Q200,292 265,305 Q330,318 395,305 Q460,292 525,305 Q580,316 640,305"/>
    <path d="M130,330 Q190,318 255,330 Q320,342 385,330 Q450,318 515,330 Q570,340 640,330"/>
    <path d="M145,355 Q205,344 270,355 Q335,366 400,355 Q465,344 530,355 Q585,363 635,355"/>
  </g>

  <!-- Borde piscina / bordillo -->
  <rect x="95" y="205" width="610" height="16" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="95" y="395" width="610" height="16" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="95" y="205" width="16" height="206" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="689" y="205" width="16" height="206" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Escalera piscina -->
  <g fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5">
    <rect x="130" y="340" width="40" height="8" rx="3"/>
    <rect x="133" y="348" width="34" height="8" rx="3"/>
    <rect x="136" y="356" width="28" height="8" rx="3"/>
    <rect x="128" y="220" width="5" height="130" rx="2"/>
    <rect x="165" y="220" width="5" height="130" rx="2"/>
  </g>

  <!-- Flotador -->
  <g transform="translate(580, 310)">
    <ellipse cx="0" cy="0" rx="42" ry="42" fill="none" stroke="#ef4444" stroke-width="18"/>
    <ellipse cx="0" cy="0" rx="42" ry="42" fill="none" stroke="white" stroke-width="18" stroke-dasharray="33 33" stroke-dashoffset="16"/>
    <ellipse cx="0" cy="0" rx="24" ry="24" fill="url(#agua)" opacity="0.7"/>
  </g>

  <!-- Tumbonas -->
  <g transform="translate(90, 420)">
    <rect x="0" y="0" width="80" height="18" rx="6" fill="#fbbf24"/>
    <rect x="60" y="-15" width="22" height="34" rx="5" fill="#fbbf24"/>
    <rect x="5" y="18" width="12" height="10" rx="3" fill="#d97706"/>
    <rect x="63" y="18" width="12" height="10" rx="3" fill="#d97706"/>
  </g>
  <g transform="translate(190, 420)">
    <rect x="0" y="0" width="80" height="18" rx="6" fill="#fb923c"/>
    <rect x="60" y="-15" width="22" height="34" rx="5" fill="#fb923c"/>
    <rect x="5" y="18" width="12" height="10" rx="3" fill="#ea580c"/>
    <rect x="63" y="18" width="12" height="10" rx="3" fill="#ea580c"/>
  </g>

  <!-- Sombrilla -->
  <line x1="540" y1="290" x2="540" y2="445" stroke="#92400e" stroke-width="5"/>
  <ellipse cx="540" cy="290" rx="75" ry="30" fill="#f97316" opacity="0.9"/>
  <ellipse cx="540" cy="290" rx="75" ry="30" fill="none" stroke="#ea580c" stroke-width="2"/>
  <line x1="465" y1="290" x2="540" y2="290" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="482" y1="278" x2="540" y2="290" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="500" y1="268" x2="540" y2="290" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="520" y1="262" x2="540" y2="290" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="540" y1="290" x2="615" y2="290" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="540" y1="290" x2="598" y2="278" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="540" y1="290" x2="580" y2="268" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="540" y1="290" x2="560" y2="262" stroke="#ea580c" stroke-width="1.5"/>

  <!-- Texto -->
  <text x="400" y="130" font-family="Georgia, serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#0c4a6e" opacity="0.9">Hablemos de</text>
  <text x="400" y="182" font-family="Georgia, serif" font-size="52" font-weight="bold" text-anchor="middle" fill="#0369a1">Piscinas</text>
</svg>
