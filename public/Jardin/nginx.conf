server {
    listen 80;
    server_name www.hablemosdejardineria.com;

    # Redirigir www → no-www (SEO canónico)
    return 301 https://hablemosdejardineria.com$request_uri;
}

server {
    listen 80 default_server;
    server_name hablemosdejardineria.com;

    root /usr/share/nginx/html;
    index index.html;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com;" always;

    # Cache de assets estáticos (JS, CSS, imágenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, must-revalidate";
    }

    # Sin caché para el feed de contenido (actualización frecuente)
    location /content/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # Fallback a index.html para rutas SPA / entrada.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
