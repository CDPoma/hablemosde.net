# Redirige www.hablemosde.net → hablemosde.net (sin www, sin HTTP)
server {
    listen 80;
    server_name www.hablemosde.net hablemosde.net;
    return 301 https://hablemosde.net$request_uri;
}

server {
    listen 443 ssl;
    server_name www.hablemosde.net;
    return 301 https://hablemosde.net$request_uri;
}

server {
    listen 443 ssl;
    server_name hablemosde.net;

    root /usr/share/nginx/html;
    index index.html;

    # Cabeceras de seguridad
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-Frame-Options            "SAMEORIGIN" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # CSP permisivo para AdSense + Google Fonts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Cache para assets estáticos
    location ~* \.(css|js|svg|jpg|jpeg|png|webp|woff2|woff|ico)$ {
        add_header Cache-Control "public, max-age=604800, immutable" always;
        try_files $uri =404;
    }

    # robots.txt, sitemap, ads.txt — sin caché
    location ~* \/(robots\.txt|sitemap.*\.xml|ads\.txt)$ {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
