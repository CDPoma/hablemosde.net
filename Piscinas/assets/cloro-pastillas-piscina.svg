<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" role="img" aria-label="Pastillas de cloro multiacción para piscina">
  <defs>
    <linearGradient id="poolBg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0f7ff"/>
      <stop offset="1" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="tabletGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="dispenserBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="waterSurface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#0284c7" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Pool water background -->
  <rect width="500" height="420" fill="url(#poolBg2)"/>
  <!-- Water ripple background -->
  <path d="M0 200 Q 125 185, 250 200 Q 375 215, 500 200 L500 420 L0 420Z" fill="#0ea5e9" opacity="0.15"/>
  <path d="M0 240 Q 100 225, 250 240 Q 400 255, 500 240 L500 420 L0 420Z" fill="#0284c7" opacity="0.12"/>

  <!-- === FLOATING DISPENSER (large) === -->
  <g transform="translate(155, 180)">
    <!-- Float ring -->
    <ellipse cx="95" cy="50" rx="90" ry="30" fill="none" stroke="#94a3b8" stroke-width="14" opacity="0.6"/>
    <!-- Float ring highlight -->
    <ellipse cx="95" cy="50" rx="90" ry="30" fill="none" stroke="#e2e8f0" stroke-width="4" stroke-dasharray="20,10" opacity="0.7"/>
    <!-- Dispenser cylinder body -->
    <rect x="45" y="10" width="100" height="85" rx="12" fill="url(#dispenserBg)" stroke="#94a3b8" stroke-width="2"/>
    <!-- Dispenser holes (for slow dissolve) -->
    <g fill="#94a3b8" opacity="0.6">
      <circle cx="65" cy="30" r="4"/>
      <circle cx="85" cy="30" r="4"/>
      <circle cx="105" cy="30" r="4"/>
      <circle cx="125" cy="30" r="4"/>
      <circle cx="65" cy="50" r="4"/>
      <circle cx="85" cy="50" r="4"/>
      <circle cx="105" cy="50" r="4"/>
      <circle cx="125" cy="50" r="4"/>
      <circle cx="65" cy="70" r="4"/>
      <circle cx="85" cy="70" r="4"/>
      <circle cx="105" cy="70" r="4"/>
      <circle cx="125" cy="70" r="4"/>
    </g>
    <!-- Tablet visible inside -->
    <rect x="56" y="78" width="78" height="12" rx="6" fill="#dbeafe" opacity="0.8"/>
    <!-- Lid -->
    <rect x="42" y="5" width="106" height="12" rx="6" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Cap handle -->
    <rect x="82" y="-5" width="26" height="12" rx="4" fill="#94a3b8"/>
  </g>

  <!-- === STACK OF TABLETS (left, large) === -->
  <g transform="translate(55, 130)">
    <!-- Stack shadow -->
    <ellipse cx="70" cy="198" rx="62" ry="12" fill="#64748b" opacity="0.2"/>
    <!-- Tablet 5 (bottom) -->
    <ellipse cx="70" cy="193" rx="60" ry="15" fill="#d1d5db"/>
    <rect x="10" y="165" width="120" height="28" fill="#cbd5e1"/>
    <ellipse cx="70" cy="165" rx="60" ry="15" fill="#e2e8f0"/>
    <!-- Tablet 4 -->
    <ellipse cx="70" cy="148" rx="60" ry="15" fill="#d1d5db"/>
    <rect x="10" y="120" width="120" height="28" fill="#cbd5e1"/>
    <ellipse cx="70" cy="120" rx="60" ry="15" fill="#e2e8f0"/>
    <!-- Tablet 3 -->
    <ellipse cx="70" cy="103" rx="60" ry="15" fill="#d1d5db"/>
    <rect x="10" y="75" width="120" height="28" fill="#cbd5e1"/>
    <ellipse cx="70" cy="75" rx="60" ry="15" fill="#e2e8f0"/>
    <!-- Tablet 2 -->
    <ellipse cx="70" cy="58" rx="60" ry="15" fill="#d1d5db"/>
    <rect x="10" y="30" width="120" height="28" fill="#cbd5e1"/>
    <ellipse cx="70" cy="30" rx="60" ry="15" fill="#e2e8f0"/>
    <!-- Tablet 1 (top, with label) -->
    <ellipse cx="70" cy="13" rx="60" ry="15" fill="#d1d5db"/>
    <rect x="10" y="-15" width="120" height="28" fill="url(#tabletGrad)" stroke="#e2e8f0" stroke-width="1"/>
    <ellipse cx="70" cy="-15" rx="60" ry="15" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <!-- Label on top tablet -->
    <text x="70" y="-20" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="800" fill="#1e40af" text-anchor="middle">200g</text>
    <text x="70" y="-8" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle">MULTIACCIÓN</text>
    <text x="70" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle" font-weight="600">Pastillas 200 g</text>
  </g>

  <!-- Product info panel (right) -->
  <rect x="310" y="50" width="170" height="270" rx="16" fill="#ffffff" opacity="0.88" stroke="#bfdbfe" stroke-width="1.5"/>
  <!-- Header of panel -->
  <rect x="310" y="50" width="170" height="44" rx="16" fill="#1e40af"/>
  <rect x="310" y="78" width="170" height="16" fill="#1e40af"/>
  <text x="395" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">CLORO LENTO</text>

  <!-- Feature list -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1e3a5f">
    <text x="330" y="120">✓ Disolución lenta</text>
    <text x="330" y="142">✓ Multiacción 5-10</text>
    <text x="330" y="164">✓ Algicida integrado</text>
    <text x="330" y="186">✓ Ajuste de pH</text>
    <text x="330" y="208">✓ Agua cristalina</text>
    <text x="330" y="230">✓ 5 kg / temporada</text>
  </g>
  <!-- Divider -->
  <line x1="325" y1="242" x2="470" y2="242" stroke="#bfdbfe" stroke-width="1.5"/>
  <!-- Rating stars -->
  <text x="395" y="268" font-family="Arial" font-size="18" fill="#fbbf24" text-anchor="middle">★★★★★</text>
  <text x="395" y="285" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Valoración clientes</text>
  <!-- Cl badge -->
  <circle cx="460" cy="130" r="0"/>

  <!-- Water ripple surface lines -->
  <path d="M0 380 Q 125 368, 250 380 Q 375 392, 500 380" fill="none" stroke="#7dd3fc" stroke-width="2" opacity="0.5"/>
  <path d="M0 400 Q 100 388, 250 400 Q 400 412, 500 400" fill="none" stroke="#7dd3fc" stroke-width="1.5" opacity="0.4"/>

  <!-- Chlorine bubbles in water -->
  <g fill="#bae6fd" opacity="0.6">
    <circle cx="40"  cy="390" r="5"/>
    <circle cx="470" cy="385" r="6"/>
    <circle cx="240" cy="395" r="4"/>
    <circle cx="390" cy="388" r="5"/>
  </g>
</svg>
