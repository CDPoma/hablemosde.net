<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Piscina con agua verde por algas">
  <defs>
    <linearGradient id="murkyWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5aaa3a" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#2d6b22" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="deckGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e5e0d0"/>
      <stop offset="1" stop-color="#d8d2c0"/>
    </linearGradient>
    <radialGradient id="algaeBloom" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7bcf4a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#3d8a20" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="algaeBlur"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <!-- Pool deck background -->
  <rect width="800" height="400" fill="url(#deckGrad)"/>

  <!-- Pool border/coping -->
  <rect x="0" y="60" width="800" height="340" rx="0" fill="#d5cebc"/>
  <rect x="0" y="60" width="800" height="28" fill="#c8c0aa"/>
  <rect x="0" y="372" width="800" height="28" fill="#c8c0aa"/>
  <rect x="0" y="60" width="28" height="340" fill="#c8c0aa"/>
  <rect x="772" y="60" width="28" height="340" fill="#c8c0aa"/>

  <!-- Pool water (murky green) -->
  <rect x="28" y="88" width="744" height="284" rx="10" fill="url(#murkyWater)"/>

  <!-- Algae bloom patches -->
  <ellipse cx="200" cy="180" rx="90" ry="60" fill="url(#algaeBloom)" filter="url(#algaeBlur)"/>
  <ellipse cx="500" cy="250" rx="110" ry="70" fill="url(#algaeBloom)" filter="url(#algaeBlur)"/>
  <ellipse cx="350" cy="150" rx="70" ry="50" fill="#7bcf4a" opacity="0.15" filter="url(#algaeBlur)"/>
  <ellipse cx="650" cy="200" rx="80" ry="55" fill="url(#algaeBloom)" filter="url(#algaeBlur)"/>

  <!-- Algae strands on walls -->
  <path d="M28 130 Q 60 115, 55 145 Q 50 175, 75 165 Q 100 155, 90 185" fill="none" stroke="#3d8a20" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M28 200 Q 70 190, 65 215 Q 60 240, 80 235" fill="none" stroke="#4aaa28" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M772 160 Q 740 148, 745 170 Q 750 192, 728 185 Q 706 178, 715 205" fill="none" stroke="#3d8a20" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M772 280 Q 742 268, 748 290 Q 754 312, 730 305" fill="none" stroke="#4aaa28" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Algae bottom clusters -->
  <ellipse cx="120" cy="368" rx="50" ry="10" fill="#3d8a20" opacity="0.6"/>
  <ellipse cx="350" cy="368" rx="70" ry="12" fill="#4aaa28" opacity="0.5"/>
  <ellipse cx="600" cy="368" rx="55" ry="10" fill="#3d8a20" opacity="0.6"/>

  <!-- Floating algae particles -->
  <circle cx="150" cy="200" r="5" fill="#7bcf4a" opacity="0.6"/>
  <circle cx="300" cy="150" r="4" fill="#6db840" opacity="0.55"/>
  <circle cx="450" cy="220" r="6" fill="#7bcf4a" opacity="0.5"/>
  <circle cx="620" cy="170" r="4" fill="#6db840" opacity="0.6"/>
  <circle cx="200" cy="310" r="5" fill="#7bcf4a" opacity="0.5"/>
  <circle cx="520" cy="330" r="4" fill="#6db840" opacity="0.55"/>
  <circle cx="680" cy="290" r="6" fill="#7bcf4a" opacity="0.5"/>

  <!-- Water surface opacity (murkiness) -->
  <rect x="28" y="88" width="744" height="80" rx="10" fill="#5aaa3a" opacity="0.2"/>

  <!-- Murky water ripples (subtle, dark) -->
  <path d="M60 130 Q 200 120, 340 130 Q 480 140, 620 130 Q 700 124, 740 130" fill="none" stroke="#3d8a20" stroke-width="2" stroke-opacity="0.4"/>
  <path d="M60 200 Q 240 188, 420 200 Q 600 212, 740 200" fill="none" stroke="#3d8a20" stroke-width="2" stroke-opacity="0.3"/>
  <path d="M60 280 Q 250 268, 440 280 Q 630 292, 740 280" fill="none" stroke="#3d8a20" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Warning sign overlay -->
  <g transform="translate(340, 145)">
    <polygon points="60,0 120,105 0,105" fill="#fbbf24" stroke="#f59e0b" stroke-width="3" rx="4"/>
    <text x="60" y="82" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#92400e" text-anchor="middle">!</text>
  </g>

  <!-- Label badge -->
  <rect x="30" y="342" width="260" height="36" rx="18" fill="#2d6b22" opacity="0.9"/>
  <text x="160" y="365" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Algas verdes · Tratamiento urgente</text>
</svg>
