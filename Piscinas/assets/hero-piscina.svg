<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-label="Piscina y agua">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7fffb"/>
      <stop offset="1" stop-color="#d8f6ff"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f8ec7" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#2ed3c6" stop-opacity="0.26"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="920" height="520" rx="34" fill="url(#bg)"/>

  <g opacity="0.75">
    <circle cx="150" cy="120" r="70" fill="#2ed3c6" filter="url(#soft)"/>
    <circle cx="760" cy="120" r="90" fill="#0f8ec7" filter="url(#soft)"/>
    <circle cx="720" cy="360" r="110" fill="#2ed3c6" filter="url(#soft)"/>
  </g>

  <g>
    <rect x="120" y="170" width="680" height="260" rx="56" fill="#ffffff" opacity="0.78"/>
    <rect x="140" y="190" width="640" height="220" rx="48" fill="url(#water)"/>

    <path d="M160 250 C 220 230, 300 270, 360 250 C 420 230, 500 270, 560 250 C 620 230, 700 270, 760 250" fill="none" stroke="#0f8ec7" stroke-opacity="0.35" stroke-width="8" stroke-linecap="round"/>
    <path d="M170 305 C 230 285, 310 325, 370 305 C 430 285, 510 325, 570 305 C 630 285, 710 325, 770 305" fill="none" stroke="#2ed3c6" stroke-opacity="0.35" stroke-width="8" stroke-linecap="round"/>
    <path d="M160 360 C 220 340, 300 380, 360 360 C 420 340, 500 380, 560 360 C 620 340, 700 380, 760 360" fill="none" stroke="#0f8ec7" stroke-opacity="0.28" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g fill="#173042" opacity="0.85">
    <text x="150" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Mantenimiento claro</text>
    <text x="150" y="162" font-family="Segoe UI, Arial, sans-serif" font-size="14">pH · filtracion · limpieza</text>
  </g>
</svg>
