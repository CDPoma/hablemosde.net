[[redirects]]
  from = "https://www.hablemosdejardineria.com/*"
  to = "https://hablemosdejardineria.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "no-store"
