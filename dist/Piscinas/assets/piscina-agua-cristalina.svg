<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Piscina con agua cristalina azul">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bae6fd"/>
      <stop offset="1" stop-color="#e0f7ff"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22c9e8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0b6fa8" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0fafe"/>
      <stop offset="1" stop-color="#d9f0fb"/>
    </linearGradient>
    <radialGradient id="caustic1" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7de8ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22c9e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="caustic2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#b9f5ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22c9e8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="400" fill="url(#sky)"/>

  <!-- Pool deck / tiles border -->
  <rect x="0" y="60" width="800" height="340" rx="0" fill="#e8f4f8"/>
  <!-- Tile pattern on deck -->
  <rect x="0" y="60" width="800" height="30" fill="#cce8f0"/>
  <rect x="0" y="370" width="800" height="30" fill="#cce8f0"/>
  <rect x="0" y="60" width="30" height="340" fill="#cce8f0"/>
  <rect x="770" y="60" width="30" height="340" fill="#cce8f0"/>

  <!-- Tile grout lines on deck -->
  <line x1="0" y1="75" x2="800" y2="75" stroke="#b8dae8" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="375" x2="800" y2="375" stroke="#b8dae8" stroke-width="1" opacity="0.6"/>

  <!-- Pool water -->
  <rect x="30" y="90" width="740" height="280" rx="12" fill="url(#water)"/>

  <!-- Caustic light patterns (light refraction on pool floor) -->
  <ellipse cx="160" cy="200" rx="55" ry="30" fill="url(#caustic1)" filter="url(#blur2)"/>
  <ellipse cx="320" cy="260" rx="70" ry="25" fill="url(#caustic2)" filter="url(#blur2)"/>
  <ellipse cx="500" cy="170" rx="45" ry="35" fill="url(#caustic1)" filter="url(#blur2)"/>
  <ellipse cx="640" cy="300" rx="60" ry="20" fill="url(#caustic2)" filter="url(#blur2)"/>
  <ellipse cx="420" cy="230" rx="35" ry="45" fill="url(#caustic1)" filter="url(#blur4)"/>

  <!-- Water ripple lines -->
  <path d="M50 140 Q 150 125, 250 140 Q 350 155, 450 140 Q 550 125, 650 140 Q 720 150, 750 140" fill="none" stroke="#7de8ff" stroke-width="2.5" stroke-opacity="0.5"/>
  <path d="M50 180 Q 200 165, 350 180 Q 500 195, 650 180 Q 720 170, 750 180" fill="none" stroke="#7de8ff" stroke-width="2" stroke-opacity="0.38"/>
  <path d="M50 240 Q 180 225, 300 240 Q 420 255, 540 240 Q 660 225, 750 240" fill="none" stroke="#a0eeff" stroke-width="2" stroke-opacity="0.3"/>
  <path d="M50 300 Q 200 285, 380 300 Q 560 315, 750 300" fill="none" stroke="#7de8ff" stroke-width="2" stroke-opacity="0.28"/>
  <path d="M50 340 Q 250 325, 450 340 Q 650 355, 750 340" fill="none" stroke="#7de8ff" stroke-width="1.5" stroke-opacity="0.22"/>

  <!-- Lane divider rope (floating) -->
  <line x1="30" y1="230" x2="770" y2="230" stroke="#ff9f43" stroke-width="3" stroke-dasharray="14,8" stroke-linecap="round" opacity="0.7"/>
  <!-- Buoys on lane rope -->
  <circle cx="120" cy="230" r="7" fill="#ff9f43" opacity="0.85"/>
  <circle cx="240" cy="230" r="7" fill="#e74c3c" opacity="0.85"/>
  <circle cx="360" cy="230" r="7" fill="#ff9f43" opacity="0.85"/>
  <circle cx="480" cy="230" r="7" fill="#e74c3c" opacity="0.85"/>
  <circle cx="600" cy="230" r="7" fill="#ff9f43" opacity="0.85"/>
  <circle cx="720" cy="230" r="7" fill="#e74c3c" opacity="0.85"/>

  <!-- Pool float (donut ring) -->
  <ellipse cx="590" cy="155" rx="52" ry="28" fill="none" stroke="#ff6b9d" stroke-width="20" opacity="0.88"/>
  <ellipse cx="590" cy="155" rx="52" ry="28" fill="none" stroke="#ff9f43" stroke-width="8" stroke-dasharray="20,20" opacity="0.7"/>

  <!-- Ladder at pool edge -->
  <rect x="52" y="88" width="6" height="70" rx="3" fill="#c0c8d8" opacity="0.9"/>
  <rect x="68" y="88" width="6" height="70" rx="3" fill="#c0c8d8" opacity="0.9"/>
  <rect x="50" y="105" width="26" height="4" rx="2" fill="#a0acbc"/>
  <rect x="50" y="125" width="26" height="4" rx="2" fill="#a0acbc"/>
  <rect x="50" y="145" width="26" height="4" rx="2" fill="#a0acbc"/>

  <!-- Water sparkle stars -->
  <g fill="#ffffff" opacity="0.8">
    <polygon points="200,110 202,118 210,118 204,123 206,131 200,126 194,131 196,123 190,118 198,118" transform="scale(0.6) translate(140,100)"/>
    <polygon points="400,150 401,155 406,155 402,158 403,163 400,160 397,163 398,158 394,155 399,155" transform="scale(0.8) translate(100,50)"/>
    <polygon points="600,100 601,105 606,105 602,108 603,113 600,110 597,113 598,108 594,105 599,105" transform="scale(0.7) translate(200,80)"/>
  </g>

  <!-- Water reflection shimmer -->
  <ellipse cx="250" cy="120" rx="18" ry="5" fill="#ffffff" opacity="0.25" filter="url(#blur2)"/>
  <ellipse cx="450" cy="310" rx="22" ry="5" fill="#ffffff" opacity="0.2" filter="url(#blur2)"/>
  <ellipse cx="680" cy="190" rx="14" ry="4" fill="#ffffff" opacity="0.22" filter="url(#blur2)"/>

  <!-- Label badge -->
  <rect x="30" y="342" width="220" height="36" rx="18" fill="#0b6fa8" opacity="0.85"/>
  <text x="140" y="365" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Agua cristalina · pH 7.4</text>
</svg>
