<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" role="img" aria-label="Floculante para piscina con efecto antes y después">
  <defs>
    <linearGradient id="splitBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#d1d5db"/>
      <stop offset="50%" stop-color="#d1d5db"/>
      <stop offset="50%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="murkyHalf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ca3af" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#6b7280" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="clearHalf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#0284c7" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="bottleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="bottleLabelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0284c7"/>
      <stop offset="1" stop-color="#0c4a6e"/>
    </linearGradient>
  </defs>

  <!-- Split background: cloudy left / clear right -->
  <rect width="500" height="420" fill="#f0f9ff"/>

  <!-- Left half — murky water -->
  <rect x="0" y="0" width="250" height="420" fill="url(#murkyHalf)" opacity="0.45"/>
  <!-- Turbidity particles (left side) -->
  <g fill="#9ca3af" opacity="0.4">
    <circle cx="40"  cy="80"  r="6"/>
    <circle cx="80"  cy="130" r="5"/>
    <circle cx="55"  cy="200" r="7"/>
    <circle cx="110" cy="90"  r="4"/>
    <circle cx="130" cy="170" r="6"/>
    <circle cx="180" cy="110" r="5"/>
    <circle cx="200" cy="220" r="7"/>
    <circle cx="70"  cy="280" r="5"/>
    <circle cx="160" cy="300" r="6"/>
    <circle cx="210" cy="350" r="4"/>
    <circle cx="30"  cy="350" r="7"/>
    <circle cx="120" cy="380" r="5"/>
  </g>
  <!-- Murky label -->
  <rect x="20" y="40" width="120" height="28" rx="14" fill="#6b7280" opacity="0.85"/>
  <text x="80" y="59" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">ANTES</text>

  <!-- Right half — clear water -->
  <rect x="250" y="0" width="250" height="420" fill="url(#clearHalf)" opacity="0.35"/>
  <!-- Clear water sparkles (right side) -->
  <g fill="#7dd3fc" opacity="0.6">
    <circle cx="280" cy="100" r="3"/>
    <circle cx="340" cy="160" r="2"/>
    <circle cx="310" cy="250" r="3"/>
    <circle cx="400" cy="120" r="2"/>
    <circle cx="450" cy="200" r="3"/>
    <circle cx="380" cy="320" r="2"/>
    <circle cx="270" cy="370" r="3"/>
    <circle cx="460" cy="350" r="2"/>
  </g>
  <!-- Light caustics on clear side -->
  <ellipse cx="370" cy="300" rx="60" ry="20" fill="#bae6fd" opacity="0.2"/>
  <ellipse cx="310" cy="380" rx="50" ry="12" fill="#bae6fd" opacity="0.18"/>
  <!-- Clear label -->
  <rect x="360" y="40" width="120" height="28" rx="14" fill="#0284c7" opacity="0.9"/>
  <text x="420" y="59" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">DESPUÉS</text>

  <!-- Divider line with arrow -->
  <line x1="250" y1="0" x2="250" y2="420" stroke="#ffffff" stroke-width="3" stroke-dasharray="8,4" opacity="0.8"/>
  <!-- Arrow pointing right -->
  <g transform="translate(230, 200)">
    <circle cx="20" cy="10" r="18" fill="#0284c7" opacity="0.9"/>
    <path d="M 10 10 L 28 10 M 22 4 L 30 10 L 22 16" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- === BOTTLE CENTER === -->
  <g transform="translate(170, 100)">
    <!-- Bottle body -->
    <rect x="30" y="50" width="100" height="190" rx="18" fill="url(#bottleGrad)" stroke="#bae6fd" stroke-width="2"/>
    <!-- Bottle shoulder taper -->
    <path d="M 45 50 Q 30 30, 40 10 L 120 10 Q 130 30, 115 50Z" fill="url(#bottleGrad)" stroke="#bae6fd" stroke-width="2"/>
    <!-- Bottle neck -->
    <rect x="62" y="0" width="36" height="15" rx="4" fill="#e2e8f0" stroke="#bae6fd" stroke-width="1.5"/>
    <!-- Cap -->
    <rect x="58" y="-12" width="44" height="16" rx="6" fill="#0284c7" stroke="#0369a1" stroke-width="1.5"/>
    <rect x="63" y="-8" width="34" height="8" rx="3" fill="#38bdf8" opacity="0.5"/>

    <!-- Label on bottle -->
    <rect x="34" y="75" width="92" height="130" rx="8" fill="url(#bottleLabelGrad)"/>
    <!-- Label text -->
    <text x="80" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="900" fill="#ffffff" text-anchor="middle">FLOCU</text>
    <text x="80" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="900" fill="#ffffff" text-anchor="middle">LANTE</text>
    <line x1="40" y1="136" x2="120" y2="136" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
    <text x="80" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#bae6fd" text-anchor="middle">Superconcentrado</text>
    <text x="80" y="168" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#fbbf24" text-anchor="middle">5 L</text>
    <text x="80" y="185" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle">Con enzimas activas</text>

    <!-- Volume indicator line on bottle -->
    <line x1="30" y1="160" x2="42" y2="160" stroke="#38bdf8" stroke-width="2" opacity="0.7"/>
    <!-- Liquid inside bottle -->
    <rect x="31" y="161" width="98" height="77" rx="0" fill="#0ea5e9" opacity="0.25"/>
    <ellipse cx="80" cy="161" rx="49" ry="6" fill="#38bdf8" opacity="0.3"/>
  </g>

  <!-- Drop / pour effect -->
  <path d="M 250 295 Q 248 310, 250 330 Q 252 345, 250 360" fill="none" stroke="#0284c7" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <ellipse cx="250" cy="365" rx="12" ry="8" fill="#0284c7" opacity="0.3"/>

  <!-- Bottom label -->
  <rect x="140" y="375" width="220" height="32" rx="16" fill="#0c4a6e" opacity="0.88"/>
  <text x="250" y="396" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#bae6fd" text-anchor="middle">Clarifica el agua en pocas horas</text>
</svg>
