<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Control del pH en piscinas con kit de análisis">
  <defs>
    <linearGradient id="labBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0f9ff"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="tube" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="meterBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#labBg)"/>

  <!-- === pH SCALE BAND (main visual element) === -->
  <!-- Full pH gradient bar -->
  <defs>
    <linearGradient id="phScale" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ef4444"/>
      <stop offset="14%"  stop-color="#f97316"/>
      <stop offset="28%"  stop-color="#eab308"/>
      <stop offset="43%"  stop-color="#84cc16"/>
      <stop offset="57%"  stop-color="#22c55e"/>
      <stop offset="71%"  stop-color="#06b6d4"/>
      <stop offset="85%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect x="80" y="120" width="640" height="60" rx="10" fill="url(#phScale)" opacity="0.9"/>
  <rect x="80" y="120" width="640" height="60" rx="10" fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <!-- pH scale tick marks and labels -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1e293b" text-anchor="middle">
    <text x="80"  y="200">1</text>
    <text x="151" y="200">2</text>
    <text x="222" y="200">3</text>
    <text x="293" y="200">4</text>
    <text x="364" y="200">5</text>
    <text x="435" y="200">6</text>
    <text x="506" y="200">7</text>
    <text x="577" y="200">8</text>
    <text x="648" y="200">9</text>
    <text x="719" y="200">10</text>
  </g>
  <!-- Tick lines -->
  <g stroke="#475569" stroke-width="1.5" opacity="0.5">
    <line x1="80"  y1="180" x2="80"  y2="188"/>
    <line x1="151" y1="180" x2="151" y2="188"/>
    <line x1="222" y1="180" x2="222" y2="188"/>
    <line x1="293" y1="180" x2="293" y2="188"/>
    <line x1="364" y1="180" x2="364" y2="188"/>
    <line x1="435" y1="180" x2="435" y2="188"/>
    <line x1="506" y1="180" x2="506" y2="188"/>
    <line x1="577" y1="180" x2="577" y2="188"/>
    <line x1="648" y1="180" x2="648" y2="188"/>
    <line x1="719" y1="180" x2="719" y2="188"/>
  </g>

  <!-- Ideal range highlight (7.2–7.6) -->
  <rect x="520" y="115" width="75" height="70" rx="6" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="6,3"/>
  <rect x="520" y="115" width="75" height="70" rx="6" fill="#22c55e" opacity="0.12"/>
  <!-- Ideal range label -->
  <rect x="510" y="95" width="95" height="22" rx="11" fill="#16a34a"/>
  <text x="557" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">RANGO IDEAL</text>
  <text x="557" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" fill="#16a34a" text-anchor="middle">7.2 – 7.6</text>

  <!-- Acid / Alkaline labels -->
  <text x="200" y="85" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">ÁCIDO</text>
  <text x="650" y="85" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#6d28d9" text-anchor="middle">ALCALINO</text>
  <line x1="150" y1="90" x2="80"  y2="115" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <line x1="700" y1="90" x2="720" y2="115" stroke="#6d28d9" stroke-width="1.5" opacity="0.6"/>

  <!-- === DIGITAL pH METER (right side) === -->
  <g transform="translate(560, 240)">
    <!-- Meter body -->
    <rect x="0" y="0" width="110" height="130" rx="14" fill="url(#meterBody)" stroke="#cbd5e1" stroke-width="2"/>
    <!-- Screen -->
    <rect x="12" y="15" width="86" height="45" rx="7" fill="#0f172a"/>
    <!-- pH reading on screen -->
    <text x="55" y="30" font-family="Courier New, monospace" font-size="11" fill="#22d3ee" text-anchor="middle" opacity="0.7">pH</text>
    <text x="55" y="50" font-family="Courier New, monospace" font-size="22" font-weight="700" fill="#4ade80" text-anchor="middle">7.42</text>
    <!-- Buttons -->
    <circle cx="30" cy="90" r="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="55" cy="90" r="10" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
    <circle cx="80" cy="90" r="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Probe -->
    <rect x="48" y="120" width="14" height="50" rx="4" fill="#64748b"/>
    <rect x="52" y="155" width="6" height="18" rx="3" fill="#94a3b8"/>
    <!-- Label -->
    <text x="55" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">pH METER</text>
  </g>

  <!-- === TEST STRIPS (left side) === -->
  <g transform="translate(80, 245)">
    <!-- Strip card -->
    <rect x="0" y="0" width="75" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <!-- Strips inside card -->
    <rect x="8"  y="10" width="12" height="100" rx="3" fill="#ef4444" opacity="0.8"/>
    <rect x="24" y="10" width="12" height="100" rx="3" fill="#eab308" opacity="0.8"/>
    <rect x="40" y="10" width="12" height="100" rx="3" fill="#22c55e" opacity="0.9"/>
    <rect x="56" y="10" width="12" height="100" rx="3" fill="#3b82f6" opacity="0.8"/>
    <!-- Color chips on each strip -->
    <rect x="8"  y="90" width="12" height="14" rx="2" fill="#dc2626"/>
    <rect x="24" y="90" width="12" height="14" rx="2" fill="#d97706"/>
    <rect x="40" y="90" width="12" height="14" rx="2" fill="#16a34a"/>
    <rect x="56" y="90" width="12" height="14" rx="2" fill="#1d4ed8"/>
    <text x="37" y="135" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">TIRAS TEST</text>
  </g>

  <!-- === TEST TUBE with water sample === -->
  <g transform="translate(200, 240)">
    <rect x="20" y="0" width="28" height="90" rx="4" fill="url(#tube)" stroke="#93c5fd" stroke-width="1.5"/>
    <!-- Water fill with color showing pH around 7.4 -->
    <rect x="21" y="40" width="26" height="49" rx="3" fill="#22c55e" opacity="0.5"/>
    <ellipse cx="34" cy="40" rx="13" ry="5" fill="#4ade80" opacity="0.5"/>
    <!-- Test tube cap -->
    <rect x="18" y="-5" width="32" height="10" rx="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
    <text x="34" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">MUESTRA</text>
  </g>

  <!-- Heading text -->
  <text x="400" y="55" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#1e3a5f" text-anchor="middle">Control del pH · Química de la Piscina</text>
  <text x="400" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Mantén el pH entre 7.2 y 7.6 para máxima eficacia del cloro</text>

  <!-- Label badge -->
  <rect x="310" y="352" width="180" height="34" rx="17" fill="#1e3a5f" opacity="0.88"/>
  <text x="400" y="374" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Química del agua</text>
</svg>
