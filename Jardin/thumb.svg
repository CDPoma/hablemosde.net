<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Fondo cielo -->
  <rect width="800" height="450" fill="url(#sky)"/>

  <!-- Suelo -->
  <rect x="0" y="300" width="800" height="150" fill="url(#ground)"/>

  <!-- Sol -->
  <circle cx="680" cy="90" r="55" fill="#fde047" opacity="0.9"/>
  <!-- Rayos sol -->
  <g stroke="#fde047" stroke-width="3" opacity="0.6">
    <line x1="680" y1="20" x2="680" y2="5"/>
    <line x1="680" y1="155" x2="680" y2="170"/>
    <line x1="610" y1="90" x2="595" y2="90"/>
    <line x1="745" y1="90" x2="760" y2="90"/>
    <line x1="630" y1="40" x2="620" y2="30"/>
    <line x1="730" y1="140" x2="740" y2="150"/>
    <line x1="730" y1="40" x2="740" y2="30"/>
    <line x1="630" y1="140" x2="620" y2="150"/>
  </g>

  <!-- Árbol izquierda -->
  <rect x="90" y="220" width="22" height="90" fill="#92400e"/>
  <ellipse cx="101" cy="210" rx="55" ry="60" fill="#15803d"/>
  <ellipse cx="80" cy="230" rx="35" ry="40" fill="#16a34a"/>
  <ellipse cx="125" cy="225" rx="38" ry="42" fill="#14532d"/>

  <!-- Arbusto centro izquierda -->
  <ellipse cx="250" cy="300" rx="50" ry="35" fill="#16a34a"/>
  <ellipse cx="225" cy="308" rx="35" ry="28" fill="#15803d"/>
  <ellipse cx="278" cy="306" rx="38" ry="30" fill="#166534"/>

  <!-- Flores -->
  <!-- Flor 1 -->
  <rect x="358" y="270" width="6" height="40" fill="#65a30d"/>
  <circle cx="361" cy="265" r="14" fill="#fb923c"/>
  <circle cx="361" cy="265" r="7" fill="#fbbf24"/>
  <!-- pétalos -->
  <ellipse cx="361" cy="251" rx="5" ry="8" fill="#fb923c"/>
  <ellipse cx="361" cy="279" rx="5" ry="8" fill="#fb923c"/>
  <ellipse cx="347" cy="265" rx="8" ry="5" fill="#fb923c"/>
  <ellipse cx="375" cy="265" rx="8" ry="5" fill="#fb923c"/>

  <!-- Flor 2 -->
  <rect x="418" y="265" width="6" height="45" fill="#65a30d"/>
  <circle cx="421" cy="260" r="14" fill="#f472b6"/>
  <circle cx="421" cy="260" r="7" fill="#fbbf24"/>
  <ellipse cx="421" cy="246" rx="5" ry="8" fill="#f472b6"/>
  <ellipse cx="421" cy="274" rx="5" ry="8" fill="#f472b6"/>
  <ellipse cx="407" cy="260" rx="8" ry="5" fill="#f472b6"/>
  <ellipse cx="435" cy="260" rx="8" ry="5" fill="#f472b6"/>

  <!-- Flor 3 -->
  <rect x="478" y="272" width="6" height="38" fill="#65a30d"/>
  <circle cx="481" cy="267" r="13" fill="#a78bfa"/>
  <circle cx="481" cy="267" r="6" fill="#fbbf24"/>
  <ellipse cx="481" cy="254" rx="5" ry="7" fill="#a78bfa"/>
  <ellipse cx="481" cy="280" rx="5" ry="7" fill="#a78bfa"/>
  <ellipse cx="468" cy="267" rx="7" ry="5" fill="#a78bfa"/>
  <ellipse cx="494" cy="267" rx="7" ry="5" fill="#a78bfa"/>

  <!-- Césped detalle -->
  <g fill="#22c55e">
    <ellipse cx="150" cy="300" rx="8" ry="15"/>
    <ellipse cx="165" cy="298" rx="7" ry="13"/>
    <ellipse cx="310" cy="300" rx="8" ry="14"/>
    <ellipse cx="550" cy="300" rx="9" ry="15"/>
    <ellipse cx="600" cy="298" rx="7" ry="12"/>
    <ellipse cx="700" cy="300" rx="8" ry="14"/>
    <ellipse cx="720" cy="298" rx="6" ry="11"/>
  </g>

  <!-- Camino de piedras -->
  <ellipse cx="400" cy="380" rx="30" ry="15" fill="#d1d5db" opacity="0.7"/>
  <ellipse cx="450" cy="400" rx="28" ry="13" fill="#d1d5db" opacity="0.7"/>
  <ellipse cx="350" cy="400" rx="28" ry="13" fill="#d1d5db" opacity="0.7"/>
  <ellipse cx="400" cy="425" rx="30" ry="14" fill="#d1d5db" opacity="0.7"/>

  <!-- Mariposa -->
  <g transform="translate(560,190) rotate(-15)">
    <ellipse cx="-10" cy="-5" rx="16" ry="10" fill="#fde047" opacity="0.85"/>
    <ellipse cx="10" cy="-5" rx="16" ry="10" fill="#fde047" opacity="0.85"/>
    <ellipse cx="-8" cy="5" rx="10" ry="7" fill="#fbbf24" opacity="0.85"/>
    <ellipse cx="8" cy="5" rx="10" ry="7" fill="#fbbf24" opacity="0.85"/>
    <rect x="-2" y="-12" width="4" height="22" rx="2" fill="#78350f"/>
  </g>

  <!-- Texto -->
  <text x="400" y="160" font-family="Georgia, serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#14532d" opacity="0.9">Hablemos de</text>
  <text x="400" y="210" font-family="Georgia, serif" font-size="52" font-weight="bold" text-anchor="middle" fill="#15803d">Jardinería</text>
</svg>
